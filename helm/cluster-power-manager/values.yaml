# Default values for cluster-power-manager.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Power manager namespace
namespace:
  label: controller-manager
  name: power-manager

# Service Account for the overarching operator
operatorserviceaccount:
  name: power-manager-operator
  namespace: power-manager

# Service Account for the Power Node Agent
agentserviceaccount:
  name: power-manager-node-agent
  namespace: power-manager

# Role for the overarching operator
operatorrole:
  name: operator-custom-resource-definitions-role
  namespace: power-manager
  resources: ["powerconfigs", "powerconfigs/status", "powerprofiles", "powerprofiles/status", "events", "daemonsets", "configmaps", "configmaps/status", "leases", "uncores"]

# Role Binding for the overarching operator
operatorrolebinding:
  name: operator-custom-resource-definitions-role-binding
  namespace: power-manager
  serviceaccount:
    name: power-manager-operator
    namespace: power-manager
  rolename: operator-custom-resource-definitions-role

# Cluster Role for the overarching operator
operatorclusterrole:
  name: operator-nodes
  resources: ["nodes", "nodes/status", "configmaps", "configmaps/status", "powerconfigs", "powerconfigs/status", "powerprofiles", "powerprofiles/status", "powernodestates", "powernodestates/status", "events", "daemonsets", "uncores", "uncores/status"]

# Cluster Role Binding for the overarching operator
operatorclusterrolebinding:
  name: operator-nodes-binding
  serviceaccount:
    name: power-manager-operator
    namespace: power-manager
  clusterrolename: operator-nodes

# Cluster Role for the Power Node Agent
agentclusterrole:
  name: node-agent-cluster-resources
  resources: ["nodes", "nodes/status", "pods", "pods/status", "cronjobs", "cronjobs/status", "powernodeconfigs", "powerprofiles", "powerprofiles/status", "powernodestates", "powernodestates/status", "cstates", "cstates/status", "timeofdays", "timeofdays/status", "timeofdaycronjobs", "timeofdaycronjobs/status", "uncores", "uncores/status"]
# Cluster Role Binding for the Power Node Agent
agentclusterrolebinding:
  name: node-agent-cluster-resources-binding
  serviceaccount:
    name: power-manager-node-agent
    namespace: power-manager
  clusterrolename: node-agent-cluster-resources

# Deployment for the overarching operator
operator:
  name: controller-manager
  namespace: power-manager
  labels:
    controlplane: controller-manager
  replicas: 1
  container:
    serviceaccount:
      name: power-manager-operator
    command: /manager
    args: --enable-leader-election
    image: $(IMAGE_REGISTRY)/kubernetes-power-manager-operator:$(VERSION)
    name: manager
    cpu:
      limits: 100m
      requests: 100m
    memory:
      limits: 30Mi
      requests: 30Mi

# Values for the PowerConfig
powerconfig:
  name: power-config
  namespace: power-manager
  nodeselector:
    label: "feature.node.kubernetes.io/power-node"
    value: 'true'

# Values for the Shared PowerProfile
sharedprofile:
  name: shared
  namespace: power-manager
  spec:
    max: 1000
    min: 1000
    epp: "power"
    governor: "powersave"
