name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - docs/**
      - hack/**
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - LICENSE
      - .gitignore
      - docs/**
      - hack/**

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Generate, build CRDs, and run unit and integration tests
        run: make test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: golangci-lint
        run: make golangci-lint

  images:
    name: Images
    needs: [test, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    env:
      REGISTRY: ghcr.io
      OPERATOR_IMAGE: ghcr.io/cluster-power-manager/cluster-power-manager-operator
      OPERATOR_DESCRIPTION: Cluster Power Manager Operator
      AGENT_IMAGE: ghcr.io/cluster-power-manager/cluster-power-node-agent
      AGENT_DESCRIPTION: Cluster Power Manager Node Agent
      IMAGE_TAG: latest
      DOCKER_METADATA_ANNOTATIONS_LEVELS: index
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to ghcr.io
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Operator image metadata
        id: operator-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: type=raw,value=${{ env.IMAGE_TAG }}
          labels: org.opencontainers.image.description=${{ env.OPERATOR_DESCRIPTION }}
          annotations: org.opencontainers.image.description=${{ env.OPERATOR_DESCRIPTION }}
      - name: ${{ github.event_name == 'push' && 'Build and push operator image' || 'Build operator image' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.operator-meta.outputs.tags }}
          labels: ${{ steps.operator-meta.outputs.labels }}
          annotations: ${{ steps.operator-meta.outputs.annotations }}
      - name: Agent image metadata
        id: agent-meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: type=raw,value=${{ env.IMAGE_TAG }}
          labels: org.opencontainers.image.description=${{ env.AGENT_DESCRIPTION }}
          annotations: org.opencontainers.image.description=${{ env.AGENT_DESCRIPTION }}
      - name: ${{ github.event_name == 'push' && 'Build and push agent image' || 'Build agent image' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: build/Dockerfile.nodeagent
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.agent-meta.outputs.tags }}
          labels: ${{ steps.agent-meta.outputs.labels }}
          annotations: ${{ steps.agent-meta.outputs.annotations }}
